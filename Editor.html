<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor</title>
  <link rel="stylesheet" href="Style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <style>
    body {
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
      color: #333;
    }

    h1 {
      margin-top: 1rem;
    }

    #drawing-canvas {
      cursor: crosshair;
      background: #ffffff;
      image-rendering: pixelated;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .toolbar {
      padding: 10px;
      background: #e9e9e9;
      border-radius: 4px;
      display: inline-block;
    }

    .toolbar button {
      margin: 0 4px;
      padding: 4px 12px;
      border-radius: 4px;
    }

    .toolbar button.active {
      background-color: #85f0b9;
    }
  </style>
</head>
<body>
  <div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <a href="PromptPage.html">Prompt</a>
    <a href="#">Browse</a>
    <a href="#">Leaderboard</a>
    <a href="Editor.html">Editor</a>
  </div>

  <button onclick="openNav()">Menu</button>

  <div class="container mt-4">
    <div class="row">
      <div class="col-12 text-center">
        <h1>Today's Prompt: <mark>Example</mark></h1>
      </div>
    </div>

    <div class="row mt-4 justify-content-center">
      <div class="col-md-8 text-center">
        <!-- Toolbar -->
        <div class="toolbar mb-3">
          <button id="btn-brush" class="active">Brush</button>
          <button id="btn-eraser">Eraser</button>
          <button id="btn-clear">Clear</button>
          <label class="ms-3">
            Color: <input type="color" id="color-picker" value="#000000">
          </label>
          <label class="ms-3">
            Size: <input type="range" id="brush-size" min="1" max="20" value="3">
            <span id="size-label">3</span>
          </label>
        </div>

        <!-- Canvas -->
        <canvas id="drawing-canvas" width="256" height="256"></canvas>

        <!-- Submit -->
        <div class="mt-3">
          <button type="button" class="btn btn-primary">Submit Drawing</button>
        </div>
      </div>

      <!-- Sidebar info -->
      <div class="col-md-3 mt-4 mt-md-0">
        <div class="border rounded p-4">
          <h3>Time Left</h3>
          <p>Next prompt in: xxh xxm</p>
          <hr>
          <h4>Your Status</h4>
          <p>You have not submitted a drawing yet today.</p>
          <p>1 submission per day</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Sidenav
    function openNav() {
      document.getElementById("mySidenav").style.width = "max(10%, 100px)";
    }
    function closeNav() {
      document.getElementById("mySidenav").style.width = "0";
    }

    // Canvas editor
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');

    const displayScale = 2;
    canvas.style.width = (256 * displayScale) + 'px';
    canvas.style.height = (256 * displayScale) + 'px';

    let drawing = false;
    let tool = 'brush';
    let color = '#000000';
    let brushSize = 3;
    let lastX = null;
    let lastY = null;

    const btnBrush = document.getElementById('btn-brush');
    const btnEraser = document.getElementById('btn-eraser');
    const btnClear = document.getElementById('btn-clear');
    const colorPicker = document.getElementById('color-picker');
    const sizeSlider = document.getElementById('brush-size');
    const sizeLabel = document.getElementById('size-label');

    btnBrush.addEventListener('click', () => {
      tool = 'brush';
      btnBrush.classList.add('active');
      btnEraser.classList.remove('active');
    });

    btnEraser.addEventListener('click', () => {
      tool = 'eraser';
      btnEraser.classList.add('active');
      btnBrush.classList.remove('active');
    });

    btnClear.addEventListener('click', () => {
      ctx.clearRect(0, 0, 256, 256);
    });

    colorPicker.addEventListener('input', (e) => {
      color = e.target.value;
    });

    sizeSlider.addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value);
      sizeLabel.textContent = brushSize;
    });

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (256 / rect.width),
        y: (e.clientY - rect.top) * (256 / rect.height)
      };
    }

    function drawDot(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
      if (tool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = color;
      }
      ctx.fill();
    }

    function drawLine(x0, y0, x1, y1) {
      const dist = Math.hypot(x1 - x0, y1 - y0);
      const steps = Math.max(Math.ceil(dist), 1);

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = x0 + (x1 - x0) * t;
        const y = y0 + (y1 - y0) * t;
        drawDot(x, y);
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      drawing = true;
      const pos = getCanvasPos(e);
      lastX = pos.x;
      lastY = pos.y;
      drawDot(pos.x, pos.y);
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!drawing) return;
      const pos = getCanvasPos(e);
      drawLine(lastX, lastY, pos.x, pos.y);
      lastX = pos.x;
      lastY = pos.y;
    });

    canvas.addEventListener('mouseup', () => {
      drawing = false;
      lastX = null;
      lastY = null;
    });

    canvas.addEventListener('mouseleave', () => {
      drawing = false;
      lastX = null;
      lastY = null;
    });
  </script>
</body>
</html>
