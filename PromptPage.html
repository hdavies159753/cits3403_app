<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PromptPage</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="#">Prompt</a>
        <a href="#">Browse</a>
        <a href="#">Leaderboard</a>
    </div>

    <button onclick="openNav()">Menu</button>

      <div class="row">
        <div class= "col-sm-12 text-center">
          <h1>Todays Prompt is: <mark>Example</mark></h1>
        </div>
      
    
        <div class="row mt-5 align-items-start">

    <!-- Left side -->
    <div class="col-md-9 text-center">
        <div class="border rounded p-5" style="height: 300px;">
            <p class="mt-5">Drawing box will go here</p>
        </div>

        <div class="mt-4">
            <button type="button">Brush</button>
            <button type="button">Eraser</button>
            <button type="button">Color</button>
            <button type="button">Clear</button>
        </div>

        <div class="mt-3">
            <button type="button" class="btn btn-primary">Submit Drawing</button>
            <button type="button" class="btn btn-light border ms-2">Clear image</button>
        </div>
    </div>

    <!-- Right side -->
    <div class="col-md-3 mt-4 mt-md-0">
        <div class="border rounded p-4">
            <h3>Time Left</h3>
            <p>Next prompt in: xxh xxm</p>
            <hr>
            <h4>Your Status</h4>
            <p>You have not submitted a drawing yet today.</p>
            <p>1 submission per day</p>
        </div>
    </div>

</div>

<div class="row mt-5">
    <div class="col-12">
        <h2>Today's Community Drawings</h2>
        <p>Submit your drawing to unlock this section</p>
    </div>
</div>

    </div>
    <script>
        function openNav() {
                document.getElementById("mySidenav").style.width = "max(10%, 100px)";
        }

        function closeNav() {
        document.getElementById("mySidenav").style.width = "0";
        }
    </script>
</body>
</html>
