{% extends "base.html" %}

{% block title %}Drawing Submitted{% endblock %}

{% block sidebar %}{% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <h1 class="display-4 fw-bold">Drawing Submitted!</h1>
    <p class="mt-3">Your drawing for <mark>{{ drawing.prompt.text }}</mark> has been submitted.</p>

    <div class="mt-4">
        <img src="{{ drawing.image }}" alt="Your submitted drawing"
             class="img-fluid rounded" style="max-width: 512px; border: 2px solid #82baff;">
    </div>

    <div class="mt-4">
        <a href="{{ url_for('main.browse') }}" class="btn btn-primary me-2">Browse Drawings</a>
        <a href="{{ url_for('main.leaderboard') }}" class="btn btn-primary">Leaderboard</a>
    </div>
</div>
{% endblock %}
