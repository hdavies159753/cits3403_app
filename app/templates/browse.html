{% extends "base.html" %}

{% block title %}Browse Page{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 text-center">
        <h1 class="display-3 fw-bold">Daily Doodle</h1>
    </div>
</div>

<div class="container mt-5">

    <!-- Page heading -->
    <div class="row">
        <div class="col-12 text-center">
            <h1>Browse Previous Drawings</h1>
        </div>
    </div>

    <!-- Filter section -->
    <div class="row mt-4">
        <div class="col-md-6">
            <label for="promptSelect" class="form-label">Choose a prompt</label>
            <select id="promptSelect" class="form-select">
            </select>
        </div>

        <div class="col-md-6">
            <label for="dateSelect" class="form-label">Choose a date</label>
            <select id="dateSelect" class="form-select">
            </select>
        </div>
    </div>

    <!-- Gallery section -->
    <div class="row mt-5 g-4" id="drawingGallery">
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='browse.js') }}"></script>
{% endblock %}
