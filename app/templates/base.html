<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}My App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    <img class="vine1" src="{{ url_for('static', filename='vine1.png') }}" />
    <img class="vine2" src="{{ url_for('static', filename='vine2.webp') }}" alt="vine2" class="vine2">
    <img class="vine3" src="{{ url_for('static', filename='vine3.webp') }}" alt="vine3" class="vine3">
    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="{{ url_for('main.index') }}">Prompt</a>
        <a href="{{ url_for('main.browse') }}">Browse</a>
        <a href="{{ url_for('main.leaderboard') }}">Leaderboard</a>
    </div>

    <button onclick="openNav()">Menu</button>

    {% block content %}{% endblock %}

    <script>
        function openNav() {
            document.getElementById("mySidenav").style.width = "max(10%, 100px)";
        }

        function closeNav() {
            document.getElementById("mySidenav").style.width = "0";
        }
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
