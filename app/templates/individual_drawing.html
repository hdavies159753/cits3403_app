{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <a href = "{{ url_for('main.browse') }}" class="btn btn-secondary">
        Back to Browse
    </a>
    <img src = "{{ drawing.image }}" alt="drawing" class = "img-fluid rounded" style = "max-height: 88vh;">
    
    <h2 class="mt-2">
        {{ drawing.artist }}
    </h2>
    <p>
        Prompt: {{drawing.prompt}}
    </p>
    <p>
        Number of Votes:
        <span id = "vote-count-{{ drawing.id }}">
            {{drawing.votes|length}}
        </span>
    </p>
    <button 
    class = "btn btn-primary vote-btn" 
    data-drawing-id = "{{ drawing.id}}">
        Vote
    </button>
<script src="{{ url_for('static', filename='vote.js') }}"></script>
</div>
{% endblock %}
