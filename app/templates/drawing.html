{% extends "base.html" %}

{% block title %}Drawing{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='drawing.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 text-center">

      <!-- Title and prompt -->
      <h1>My Drawing</h1>
      <p class="text-muted">Prompt: <mark>Example</mark></p>

      <!-- Drawing display -->
      <div class="d-flex justify-content-center my-4">
        <canvas class="drawing-display"></canvas>
      </div>

      <!-- Artist info and rating -->
      <div class="border rounded p-3 d-inline-block">
        <p class="mb-1"><strong>Artist:</strong> Username</p>
        <p class="mb-0"><strong>Rating:</strong> 4.8 / 5</p>
      </div>

    </div>
  </div>
</div>
{% endblock %}
