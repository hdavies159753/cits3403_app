<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drawing</title>
  <link rel="stylesheet" href="Style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <style>
    body {
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
      color: #333;
    }

    h1 {
      margin-top: 1rem;
    }

    .drawing-display {
      background: #ffffff;
      image-rendering: pixelated;
      width: 512px;
      height: 512px;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <a href="PromptPage.html">Prompt</a>
    <a href="#">Browse</a>
    <a href="#">Leaderboard</a>
    <a href="Editor.html">Editor</a>
  </div>

  <button onclick="openNav()">Menu</button>

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-8 text-center">

        <!-- Title and prompt -->
        <h1>My Drawing</h1>
        <p class="text-muted">Prompt: <mark>Example</mark></p>

        <!-- Drawing display -->
        <div class="d-flex justify-content-center my-4">
          <canvas class="drawing-display" width="256" height="256"></canvas>
        </div>

        <!-- Artist info and rating -->
        <div class="border rounded p-3 d-inline-block">
          <p class="mb-1"><strong>Artist:</strong> Username</p>
          <p class="mb-0"><strong>Rating:</strong> 4.8 / 5</p>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Sidenav
    function openNav() {
      document.getElementById("mySidenav").style.width = "max(10%, 100px)";
    }
    function closeNav() {
      document.getElementById("mySidenav").style.width = "0";
    }
  </script>
</body>
</html>
