<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}My App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="ball"></div>
    <div class="cloud"></div>
    <div class="cloud2"></div>
    <div class="cloud3"></div>
    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="{{ url_for('main.index') }}">Prompt</a>
        <a href="{{ url_for('main.browse') }}">Browse</a>
        <a href="{{ url_for('main.leaderboard') }}">Leaderboard</a>
        <hr style="border-color: #505050; margin: 10px 20px;">
        {% if current_user.is_authenticated %}
          <a href="{{ url_for('main.logout') }}">Logout ({{ current_user.username }})</a>
        {% else %}
          <a href="{{ url_for('main.login') }}">Login</a>
          <a href="{{ url_for('main.register') }}">Register</a>
        {% endif %}
    </div>

    <button class="menu-btn" onclick="openNav()">Menu</button>

    {% block content %}{% endblock %}

    <script type="module">
      import { openNav, closeNav } from "{{ url_for('static', filename='sidebar.js') }}";

      window.openNav = openNav;
      window.closeNav = closeNav;
    </script>
  {% block scripts %}{% endblock %}
  </body>
</html>
